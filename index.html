<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Riddhima 💖</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- RESET & ROOT VARIABLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --ios-bg: rgba(255, 255, 255, 0.15);
            --ios-border: rgba(255, 255, 255, 0.25);
            --ios-blur: blur(20px);
            --primary-pink: #ff477e;
            --primary-purple: #833ab4;
            --font-main: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-romantic: 'Dancing Script', cursive;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font-main);
            background: #000;
            color: #fff;
        }

        /* --- PERSISTENT BACKGROUND & CANVASES --- */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .gradient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: radial-gradient(circle at 50% 50%, rgba(255, 71, 126, 0.15) 0%, rgba(131, 58, 180, 0.15) 100%);
            pointer-events: none;
        }

        /* --- AUDIO CONTROLLER --- */
        .audio-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            border: 1px solid var(--ios-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 1.2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .audio-control:active {
            transform: scale(0.9);
        }

        .audio-control.playing i {
            animation: pulse-audio 1.2s infinite ease-in-out;
        }

        @keyframes pulse-audio {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); color: var(--primary-pink); }
        }

        /* --- SCREEN CONTAINER --- */
        .screen-container {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* --- GLASS CARD FRAME --- */
        .glass-card {
            width: 100%;
            max-width: 400px;
            background: var(--ios-bg);
            border: 1px solid var(--ios-border);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            border-radius: 36px;
            padding: 30px 24px;
            text-align: center;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 15;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- PAGE 1 UI --- */
        #page-1 {
            opacity: 1;
            transform: scale(1);
        }

        .gif-container {
            width: 100%;
            height: 160px;
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        .gif-container img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
            border-radius: 20px;
        }

        .heading-main {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #ffd3e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .heading-romantic {
            font-family: var(--font-romantic);
            font-size: 2.4rem;
            color: var(--primary-pink);
            margin-bottom: 24px;
            text-shadow: 0 0 15px rgba(255, 71, 126, 0.4);
            line-height: 1.2;
        }

        /* Dynamic Feedback Text Container */
        .feedback-box {
            min-height: 50px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 600;
            color: #ffd3e1;
            transition: all 0.3s ease;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            padding: 0 10px;
        }

        .btn-wrapper {
            position: relative;
            height: 70px;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-proposal {
            outline: none;
            border: none;
            border-radius: 20px;
            font-family: var(--font-main);
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #btn-yes {
            background: linear-gradient(135deg, #ff477e 0%, #ff1f5a 100%);
            color: white;
            padding: 16px 36px;
            position: absolute;
            z-index: 50;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 12px 30px rgba(255, 31, 90, 0.4);
            left: calc(50% - 130px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        width 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        height 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        font-size 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #btn-no {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            padding: 16px 36px;
            position: absolute;
            right: calc(50% - 130px);
            z-index: 45;
            border: 1px solid var(--ios-border);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s ease-out;
        }

        /* --- PAGE 2 UI --- */
        #page-2 {
            display: none;
            opacity: 0;
            transform: scale(0.9);
        }

        .typewriter-box {
            min-height: 180px;
            margin: 20px 0;
            font-size: 1.05rem;
            line-height: 1.6;
            color: #fff;
            text-align: center;
            font-weight: 500;
        }

        .typewriter-box p {
            margin-bottom: 8px;
            opacity: 0;
            transform: translateY(10px);
            animation: revealLine 0.6s forwards ease;
        }

        @keyframes revealLine {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- PHOTO FRAMING --- */
        .photo-frame {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 24px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(45deg, var(--primary-pink), var(--primary-purple), #ffd3e1);
            background-size: 200% 200%;
            animation: gradientBorder 4s infinite alternate, slowPulse 8s infinite ease-in-out;
            box-shadow: 0 10px 30px rgba(255, 71, 126, 0.4);
        }

        .photo-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 12s ease;
        }

        .photo-frame:hover img {
            transform: scale(1.25);
        }

        @keyframes gradientBorder {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        @keyframes slowPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }

        /* --- SIGNATURE FOOTER --- */
        .footer-sig {
            margin-top: 24px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .heartbeat-icon {
            color: var(--primary-pink);
            animation: heartBeat 1s infinite;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            14% { transform: scale(1.2); }
            28% { transform: scale(1); }
            42% { transform: scale(1.25); }
            70% { transform: scale(1); }
        }

        /* --- SCREEN SHAKE & FX ANIMATIONS --- */
        .shake-fx {
            animation: shake 0.35s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .fade-out-custom {
            opacity: 0 !important;
            transform: scale(0.9) !important;
        }

        /* Smoke/Fade Out effect for NO button disappearance */
        .smoke-out {
            animation: smokeDissolve 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes smokeDissolve {
            0% {
                transform: scale(1);
                opacity: 1;
                filter: blur(0px);
            }
            50% {
                opacity: 0.5;
                filter: blur(4px);
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
                filter: blur(12px);
                pointer-events: none;
            }
        }

        /* Letter Box / Poetic Overlay Style */
        .poetic-quote {
            font-size: 0.78rem;
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.45);
            font-style: italic;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            margin-top: 16px;
            padding-top: 12px;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>

    <!-- Canvas for Particles & Dynamic Color Gradients -->
    <canvas id="bg-canvas"></canvas>
    <div class="gradient-overlay"></div>

    <!-- Floating Audio Control -->
    <div class="audio-control" id="audio-btn">
        <i class="fa-solid fa-music"></i>
    </div>

    <!-- Hidden background audio stream element -->
    <audio id="love-theme" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="screen-container">

        <!-- --- CARD: PAGE 1 --- -->
        <div class="glass-card" id="page-1">
            <div class="gif-container">
                <!-- Premium romantic/cute proposing GIF -->
                <img id="proposal-gif" src="https://media.tenor.com/t796XbJm1mMAAAAj/cony-line.gif" alt="Cute Proposing Animated GIF">
            </div>
            
            <h1 class="heading-main">💖 Riddhima...</h1>
            <p class="heading-romantic">Will You Be My Forever? 🥺❤️</p>

            <div class="feedback-box" id="funny-commentary">
                😏 Answer honestly...
            </div>

            <div class="btn-wrapper" id="btn-container">
                <button class="btn-proposal" id="btn-yes">
                    <i class="fa-solid fa-heart"></i> YES
                </button>
                <button class="btn-proposal" id="btn-no">
                    NO <i class="fa-solid fa-heart-crack"></i>
                </button>
            </div>

            <div class="poetic-quote">
                "Just a life, fella, right before you go out there... <br>I'm with you and I could roll into another year."
            </div>
        </div>

        <!-- --- CARD: PAGE 2 --- -->
        <div class="glass-card" id="page-2">
            <div class="photo-frame">
                <div class="photo-inner">
                    <!-- Placeholder premium illustrative photo, easily replacement-ready -->
                    <img id="couple-img" src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=600&auto=format&fit=crop" alt="Riddhima & Raj">
                </div>
            </div>

            <div class="typewriter-box" id="typing-love-notes">
                <!-- Rendered asynchronously inside scripts -->
            </div>

            <div class="footer-sig">
                Made with endless love by Raj <i class="fa-solid fa-heart heartbeat-icon"></i>
            </div>
        </div>

    </div>

    <!-- --- CORE INTERACTIVE SCRIPTING --- -->
    <script>
        /* --- CONFIGURATION & DOM REFERENCES --- */
        const page1 = document.getElementById('page-1');
        const page2 = document.getElementById('page-2');
        const btnYes = document.getElementById('btn-yes');
        const btnNo = document.getElementById('btn-no');
        const btnContainer = document.getElementById('btn-container');
        const feedbackBox = document.getElementById('funny-commentary');
        const gifImg = document.getElementById('proposal-gif');
        const typingBox = document.getElementById('typing-love-notes');
        const audioBtn = document.getElementById('audio-btn');
        const bgAudio = document.getElementById('love-theme');
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        let particleArray = [];
        let canvasW, canvasH;

        // Custom list of dynamic emotional/funny responses requested by the user
        const funnyMessages = [
            "🤨 Soch lo...",
            "🫡 Come on Riddhima...",
            "😗 Bacche ka dil mat todo...",
            "🥰 Itna bhi kya attitude... I know but still.",
            "💪 We have same mindset.",
            "😌 Say YES, I'll teach you socks kaise pehnte.",
            "🥲 Meri naak tod dena... par YES click kar dena.",
            "😎 YES button will be lucky for you. Like me.",
            "😂 Ab toh button bhi thak gaya.",
            "🥹 Last warning...",
            "😏 Last last warning...",
            "😂 Final final warning...",
            "❤️ Bas YES hi bacha hai."
        ];

        let escapeCount = 0;
        let scaleYes = 1.0;
        let scaleNo = 1.0;
        const maxEscapesBeforeDisappear = funnyMessages.length;

        /* --- FULL ENGINE RESIZE & RENDER LOOP --- */
        function initCanvas() {
            canvasW = window.innerWidth;
            canvasH = window.innerHeight;
            canvas.width = canvasW;
            canvas.height = canvasH;
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        class BeautifulParticle {
            constructor(type) {
                this.x = Math.random() * canvasW;
                this.y = Math.random() * canvasH + canvasH; // start below
                this.size = Math.random() * 15 + 10;
                this.speedY = -(Math.random() * 1.5 + 0.5);
                this.speedX = Math.random() * 0.8 - 0.4;
                this.type = type; // 'heart', 'star', 'bubble'
                this.opacity = Math.random() * 0.5 + 0.3;
                this.color = `hsla(${340 + Math.random()*40}, 100%, 75%, ${this.opacity})`;
                this.wiggle = Math.random() * 0.05;
                this.angle = Math.random() * Math.PI * 2;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                if (this.type === 'heart') {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.bezierCurveTo(-this.size/2, -this.size/2, -this.size, this.size/3, 0, this.size);
                    ctx.bezierCurveTo(this.size, this.size/3, this.size/2, -this.size/2, 0, 0);
                    ctx.fill();
                } else if (this.type === 'broken') {
                    // Draw broken heart dynamics
                    ctx.fillStyle = '#ff3333';
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.bezierCurveTo(-this.size/2, -this.size/2, -this.size, this.size/3, 0, this.size);
                    ctx.bezierCurveTo(this.size, this.size/3, this.size/2, -this.size/2, 0, 0);
                    ctx.fill();
                    // draw lightning break
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.moveTo(0, -this.size/4);
                    ctx.lineTo(-this.size/8, this.size/4);
                    ctx.lineTo(this.size/8, this.size/2);
                    ctx.stroke();
                } else if (this.type === 'sparkle') {
                    ctx.fillStyle = '#fffdf0';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#fff';
                    ctx.beginPath();
                    for (let i = 0; i < 4; i++) {
                        ctx.lineTo(0, -this.size/2);
                        ctx.lineTo(this.size/6, -this.size/6);
                        ctx.rotate(Math.PI / 2);
                    }
                    ctx.closePath();
                    ctx.fill();
                } else {
                    // glowing firefly/stars
                    ctx.fillStyle = '#fff9d4';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#fffa65';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size/4, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }

            update() {
                this.y += this.speedY;
                this.angle += this.wiggle;
                this.x += Math.sin(this.angle) * 0.4 + this.speedX;

                // slowly fade out as it climbs
                if (this.y < -100) {
                    this.y = canvasH + 100;
                    this.x = Math.random() * canvasW;
                    this.opacity = Math.random() * 0.5 + 0.3;
                }
            }
        }

        // Initialize Background Environment
        function createInitialAmbient() {
            for (let i = 0; i < 35; i++) {
                const types = ['heart', 'sparkle', 'star'];
                const randomType = types[Math.floor(Math.random() * types.length)];
                particleArray.push(new BeautifulParticle(randomType));
            }
        }
        createInitialAmbient();

        function animateBackground() {
            ctx.clearRect(0, 0, canvasW, canvasH);
            for (let i = 0; i < particleArray.length; i++) {
                particleArray[i].update();
                particleArray[i].draw();
            }
            requestAnimationFrame(animateBackground);
        }
        animateBackground();

        /* --- AUDIO TRIGGERING INTERACTION --- */
        let initializedAudio = false;
        function tryPlayAudio() {
            if (!initializedAudio) {
                bgAudio.play().then(() => {
                    audioBtn.classList.add('playing');
                    initializedAudio = true;
                }).catch(() => {
                    // Browser prevented autoplay, wait for user interact
                });
            }
        }

        audioBtn.addEventListener('click', () => {
            if (bgAudio.paused) {
                bgAudio.play();
                audioBtn.classList.add('playing');
                initializedAudio = true;
            } else {
                bgAudio.pause();
                audioBtn.classList.remove('playing');
            }
        });

        // Trigger Audio on any tap/interaction on the site
        window.addEventListener('click', tryPlayAudio, { once: true });
        window.addEventListener('touchstart', tryPlayAudio, { once: true });

        /* --- THE NO BUTTON EVADING ENGINE (60 FPS CLEAN EASING) --- */
        let noBtnTargetX = 0;
        let noBtnTargetY = 0;
        let noBtnCurrentX = 0;
        let noBtnCurrentY = 0;
        let noBtnEscaped = false;

        // Keep buttons placed natively at first. Switch to absolute tracking once interactive evading begins
        function initButtonPositions() {
            const rect = btnNo.getBoundingClientRect();
            const parentRect = btnContainer.getBoundingClientRect();
            
            // Calculate relative to the page-1 card container
            noBtnCurrentX = rect.left - parentRect.left;
            noBtnCurrentY = rect.top - parentRect.top;
            
            btnNo.style.position = 'absolute';
            btnNo.style.margin = '0';
            updateNoBtnElement();
        }

        function updateNoBtnElement() {
            btnNo.style.left = `${noBtnCurrentX}px`;
            btnNo.style.top = `${noBtnCurrentY}px`;
        }

        // Run escaping physics
        function triggerEscape(event) {
            tryPlayAudio();
            if (!noBtnEscaped) {
                initButtonPositions();
                noBtnEscaped = true;
            }

            // Screen space dimensions of parent card
            const containerRect = page1.getBoundingClientRect();
            
            // Mouse/Touch Coordinate mapping relative to the container
            const pointerX = event.clientX - containerRect.left;
            const pointerY = event.clientY - containerRect.top;

            // Generate runaway angle away from the approaching pointer
            const deltaX = noBtnCurrentX + 50 - pointerX; 
            const deltaY = noBtnCurrentY + 22 - pointerY;
            let angle = Math.atan2(deltaY, deltaX);

            // Add slight randomness to escape direction to prevent locking
            angle += (Math.random() - 0.5) * 0.8;

            // Runaway velocity distance
            const escapeDistance = 140;
            let targetX = noBtnCurrentX + Math.cos(angle) * escapeDistance;
            let targetY = noBtnCurrentY + Math.sin(angle) * escapeDistance;

            // Strict bounds checking relative to parent card window limits
            const limitRight = containerRect.width - btnNo.offsetWidth - 20;
            const limitBottom = containerRect.height - btnNo.offsetHeight - 50;

            if (targetX < 20) targetX = 20 + Math.random() * 30;
            if (targetX > limitRight) targetX = limitRight - Math.random() * 30;
            if (targetY < 50) targetY = 100 + Math.random() * 40;
            if (targetY > limitBottom) targetY = limitBottom - Math.random() * 40;

            noBtnTargetX = targetX;
            noBtnTargetY = targetY;

            onEscapeActionEffects();
        }

        // Frame update physics loop for beautiful iOS elastic feel
        function updatePhysLoops() {
            if (noBtnEscaped) {
                // Smooth Spring interpolation (lerp)
                const lerpFactor = 0.18;
                noBtnCurrentX += (noBtnTargetX - noBtnCurrentX) * lerpFactor;
                noBtnCurrentY += (noBtnTargetY - noBtnCurrentY) * lerpFactor;
                updateNoBtnElement();
            }
            requestAnimationFrame(updatePhysLoops);
        }
        requestAnimationFrame(updatePhysLoops);

        // Escape Trigger Handlers
        btnNo.addEventListener('mouseover', (e) => triggerEscape(e));
        btnNo.addEventListener('mousemove', (e) => triggerEscape(e));
        btnNo.addEventListener('touchstart', (e) => {
            e.preventDefault();
            triggerEscape(e.touches[0]);
        });

        /* --- THE ESCAPE FEEDBACK SYSTEM --- */
        function onEscapeActionEffects() {
            escapeCount++;

            // Yes button grows by 25% (cumulative scaling calculation)
            scaleYes += 0.25;
            btnYes.style.transform = `scale(${scaleYes})`;

            // No button shrinks by 10%
            scaleNo = Math.max(0.4, scaleNo - 0.1);
            btnNo.style.transform = `scale(${scaleNo})`;

            // Display dynamic messages based on current escape progression
            const msgIdx = Math.min(escapeCount - 1, funnyMessages.length - 1);
            feedbackBox.innerHTML = funnyMessages[msgIdx];
            feedbackBox.style.transform = "scale(1.1)";
            setTimeout(() => feedbackBox.style.transform = "scale(1)", 150);

            // Broken heart explosion effect for 1 second
            createBrokenHeartsBurst();

            // Trigger physical iOS style haptic frame shaking
            page1.classList.add('shake-fx');
            setTimeout(() => page1.classList.remove('shake-fx'), 350);

            // Change cute gif behavior based on escape tiers
            if (escapeCount === 4) {
                gifImg.src = "https://media.tenor.com/F0018-93lK0AAAAC/tkthao219-peach.gif"; // Sad cute peach cat
            } else if (escapeCount === 8) {
                gifImg.src = "https://media.tenor.com/XF_4G7e59iMAAAAd/funny-cute.gif"; // Cute angry/crying
            }

            // Ultimate disappearing act for NO button
            if (escapeCount >= maxEscapesBeforeDisappear) {
                btnNo.classList.add('smoke-out');
                setTimeout(() => {
                    btnNo.style.display = 'none';
                    // Re-adjust Yes Button cleanly to center
                    btnYes.style.left = "calc(50% - 65px)";
                    btnYes.style.width = "130px";
                    btnYes.style.transform = `scale(1.4)`;
                }, 800);
            }
        }

        // Spawn dynamic floating burst arrays
        function createBrokenHeartsBurst() {
            const rect = btnNo.getBoundingClientRect();
            const burstX = rect.left + rect.width / 2;
            const burstY = rect.top + rect.height / 2;

            for (let i = 0; i < 8; i++) {
                const burstHeart = new BeautifulParticle('broken');
                burstHeart.x = burstX;
                burstHeart.y = burstY;
                burstHeart.speedY = -(Math.random() * 4 + 2);
                burstHeart.speedX = Math.random() * 6 - 3;
                burstHeart.opacity = 1.0;
                particleArray.push(burstHeart);

                // Self cleaning array logic
                setTimeout(() => {
                    const idx = particleArray.indexOf(burstHeart);
                    if (idx > -1) particleArray.splice(idx, 1);
                }, 1000);
            }
        }

        /* --- THE CELEBRATION SHIFT (PAGE 2 ENGAGE) --- */
        btnYes.addEventListener('click', () => {
            tryPlayAudio();
            celebrateProposal();
        });

        function celebrateProposal() {
            // Heart Explosion
            createGrandCelebrationExplosion();

            // Fade Out Page 1 Outwards
            page1.classList.add('fade-out-custom');

            setTimeout(() => {
                page1.style.display = 'none';
                page2.style.display = 'block';
                
                // Triggers visual rendering of frame
                setTimeout(() => {
                    page2.style.opacity = '1';
                    page2.style.transform = 'scale(1)';
                    triggerRomanticPoetry();
                }, 100);
            }, 800);
        }

        function createGrandCelebrationExplosion() {
            // Fill background with dense romantic golden and pink stars & hearts
            for (let i = 0; i < 80; i++) {
                setTimeout(() => {
                    const types = ['heart', 'sparkle', 'star'];
                    const chosen = types[Math.floor(Math.random() * types.length)];
                    const celebratoryObj = new BeautifulParticle(chosen);
                    celebratoryObj.y = Math.random() * canvasH;
                    celebratoryObj.x = Math.random() * canvasW;
                    celebratoryObj.speedY = -(Math.random() * 3 + 1);
                    celebratoryObj.opacity = 1.0;
                    particleArray.push(celebratoryObj);
                }, i * 15);
            }
        }

        // Beautiful cinematic staggered line-by-line typewriter render
        function triggerRomanticPoetry() {
            const poetryLines = [
                "❤️ YAYYYYYYYYY ❤️",
                "I knew you'd say YES. 😏",
                "Maybe I'm the happiest person right now.",
                "I promise to make you smile every single day.",
                "We'll argue. We'll fight. I'll annoy you.",
                "But I'll stay consistent.",
                "I'll never leave. ❤️"
            ];

            let lineIndex = 0;

            function renderNextPoeticLine() {
                if (lineIndex < poetryLines.length) {
                    const lineEl = document.createElement('p');
                    lineEl.textContent = poetryLines[lineIndex];
                    
                    // Match styling dynamics per specific indices
                    if (lineIndex === 0) {
                        lineEl.style.fontSize = "1.5rem";
                        lineEl.style.fontWeight = "800";
                        lineEl.style.color = "var(--primary-pink)";
                    }
                    if (lineIndex === poetryLines.length - 1) {
                        lineEl.style.fontWeight = "700";
                        lineEl.style.color = "#ffd3e1";
                    }

                    typingBox.appendChild(lineEl);
                    lineIndex++;
                    setTimeout(renderNextPoeticLine, 1400); // Natural reading interval pace
                }
            }

            setTimeout(renderNextPoeticLine, 500);
        }
    </script>
