<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Riddhima ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --pink-light: #ffd1dc;
            --pink-medium: #ffb6c1;
            --pink-dark: #ff69b4;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px rgba(255, 105, 180, 0.2);
            --text-dark: #4a4a4a;
            --text-pink: #d81b60;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--pink-light); color: var(--text-dark); overflow-x: hidden; min-height: 100vh; }

        .liquid-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(120deg, #ffdde1, #ee9ca7, #ffc3a0, #ffafbd); background-size: 400% 400%; animation: gradientBG 15s ease infinite; z-index: -3; }
        .liquid-bg.dreamy { background: linear-gradient(120deg, #a18cd1, #fbc2eb, #ff9a9e, #fecfef); }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .glass { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 28px; box-shadow: var(--glass-shadow); }

        .page { display: none; min-height: 100vh; width: 100%; padding: 20px; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: opacity 1s ease; position: absolute; top: 0; left: 0; }
        .page.active { display: flex; opacity: 1; position: relative; }

        .proposal-card { max-width: 400px; width: 100%; padding: 40px 20px; text-align: center; z-index: 10; transition: transform 0.1s; }
        .gif-container { width: 200px; height: 200px; margin: 0 auto 20px; border-radius: 20px; overflow: hidden; }
        .gif-container img { width: 100%; height: 100%; object-fit: cover; }

        .btn { padding: 15px 30px; border-radius: 50px; border: none; font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; }
        #btn-yes { background: linear-gradient(135deg, #ff4081, #d81b60); color: white; z-index: 50; }
        #btn-no { background: white; color: #d81b60; border: 2px solid #ff4081; position: absolute; z-index: 10; will-change: transform; transition: transform 0.2s ease-out; }

        .section-title { font-size: 28px; font-weight: 700; text-align: center; margin: 40px 0 20px; color: var(--text-pink); }
        .reasons-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; width: 100%; max-width: 900px; margin: 0 auto 50px; }
        .flip-card { height: 130px; perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card:hover .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 10px; border-radius: 16px; }
        .flip-card-front { background: rgba(255,255,255,0.5); border: 1px solid var(--glass-border); }
        .flip-card-back { background: linear-gradient(135deg, #ff9a9e, #fecfef); color: white; transform: rotateY(180deg); font-size: 14px; font-weight: 600; }

        .love-letter-wrapper { max-width: 600px; width: 100%; margin: 20px auto; padding: 30px; background: rgba(255, 250, 240, 0.8); border-radius: 20px; font-family: 'Dancing Script', cursive; font-size: 22px; line-height: 1.6; }
        .floating-emoji { position: fixed; pointer-events: none; animation: floatUp 1.5s ease-out forwards; z-index: 100; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-100px) scale(1.5); } }
    </style>
</head>
<body>

    <div class="liquid-bg" id="main-bg"></div>
    <main id="page1" class="page active">
        <div class="proposal-card glass" id="proposal-card">
            <div class="gif-container"><img src="raj.gif" alt="Proposal"></div>
            <h1>Will You Be Mine Forever?</h1>
            <div style="display:flex; justify-content:center; gap:20px; margin-top:20px; height:100px;">
                <button id="btn-yes" class="btn">❤️ YES</button>
                <button id="btn-no" class="btn">💔 NO</button>
            </div>
        </div>
    </main>

    <main id="page2" class="page">
        <h1 class="section-title">Reasons Why I Fell For You ❤️</h1>
        <div class="reasons-grid" id="reasons-grid"></div>
        <h2 class="section-title">A Letter To You 💌</h2>
        <div class="love-letter-wrapper" id="letter"></div>
    </main>

    <script>
        const noMessages = ["Are you sure?😭", "Sahi me🙄", "Pakka?😒", "Ek baar aur soch lo😒", "Riddhima😩", "Bache ka dil mat tod rahi😞", "Just say YES... I'll teach you socks kaise pehente hain. 🧦☺️", "Destiny says YES ❤️"];
        let msgIndex = 0;
        let yesScale = 1;
        let noX = 0, noY = 0;

        const btnNo = document.getElementById('btn-no');
        const btnYes = document.getElementById('btn-yes');

        // Smooth Runaway Logic
        document.addEventListener('mousemove', (e) => {
            const rect = btnNo.getBoundingClientRect();
            const btnCenter = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
            const dist = Math.hypot(e.clientX - btnCenter.x, e.clientY - btnCenter.y);
            
            if (dist < 150) {
                noX += (Math.random() - 0.5) * 100;
                noY += (Math.random() - 0.5) * 100;
                btnNo.style.transform = `translate(${noX}px, ${noY}px)`;
            }
        });

        btnNo.addEventListener('click', () => {
            if(msgIndex < noMessages.length - 1) {
                btnNo.innerText = noMessages[msgIndex++];
                yesScale += 0.2;
                btnYes.style.transform = `scale(${yesScale})`;
            } else {
                btnYes.style.position = "fixed";
                btnYes.style.top = "0"; btnYes.style.left = "0"; btnYes.style.width = "100%"; btnYes.style.height = "100%"; btnYes.style.borderRadius = "0";
                setTimeout(() => goToPage2(), 500);
            }
        });

        function goToPage2() {
            document.getElementById('page1').classList.remove('active');
            document.getElementById('page2').classList.add('active');
            document.getElementById('main-bg').classList.add('dreamy');
        }

        const reasons = ["First your anger okay", "Rajjj Rajjj endless yapping", "Full on energetic", "Yeh huva...Wo huva...", "Mene bhi muh tod jawab diya 😂", "One more thing... Meko gussaa aa raha he 😤", "You're mature", "Your cute anger", "Your voice consoles me", "Same mindset", "Mirror version of me", "Your understanding", "Gussel he thodi", "Lekin cute he", "Chalta he", "Worth it he ❤️"];
        const grid = document.getElementById('reasons-grid');
        reasons.forEach(r => {
            grid.innerHTML += `<div class="flip-card"><div class="flip-card-inner"><div class="flip-card-front">❤️</div><div class="flip-card-back">${r}</div></div></div>`;
        });

        document.getElementById('letter').innerText = "My dearest angry bird RIDDHIMA,\n\nFrom the moment I met you online, everything felt normal. My feelings grew slowly and naturally, and before I realized it, everything had changed.\n\nYour smile, your thoughts, your guidance, and your support light up even my darkest days. You're my cute gussel ladki. Socks pehne ki akkal nahi, na hi khud ka properly khayal rakh pati ho 😅, and all those little things make me fall even harder.\n\nWe share the same mindset, like two pieces of a puzzle. I promise to cherish you, support your dreams, make you smile, annoy you forever, and always try to become the best person for you.\n\nYours always ❤️\n\n'thats wall what i want by my heart'\nJust a minute, fella, right before you go out of life. All your voices said you wouldn't last a minute, bare. One more time and you'll know your life is one to share. Just a life, baby, right before we go from here. All those people said they wouldn't last a minute near. I'm with you and I could roll into another year and have to forever loulmate. Just a life fella right before you go out there next life.";
    </script>
</body>
</html>
